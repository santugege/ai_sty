services:
  postgres:
    image: ${POSTGRES_IMAGE:-m.daocloud.io/docker.io/library/postgres:16}
    container_name: ai_sty_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-image_agent}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ${DATA_ROOT:-/opt/ai_sty/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-image_agent}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: ${MINIO_IMAGE:-m.daocloud.io/docker.io/minio/minio:latest}
    container_name: ai_sty_prod_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ${DATA_ROOT:-/opt/ai_sty/data}/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    image: ${MINIO_MC_IMAGE:-m.daocloud.io/docker.io/minio/mc:latest}
    container_name: ai_sty_prod_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env.production
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET:-agent-images} &&
      mc anonymous set download local/$${MINIO_BUCKET:-agent-images}
      "
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai_sty_prod_backend
    restart: unless-stopped
    env_file:
      - .env.production
    command: >
      sh -c "python -m alembic -c backend/alembic.ini upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    container_name: ai_sty_prod_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: ${CADDY_IMAGE:-m.daocloud.io/docker.io/library/caddy:2-alpine}
    container_name: ai_sty_prod_caddy
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_ROOT:-/opt/ai_sty/data}/caddy/data:/data
      - ${DATA_ROOT:-/opt/ai_sty/data}/caddy/config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy
